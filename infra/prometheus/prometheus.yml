global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: writer_service
    metrics_path: /metrics
    bearer_token_file: /run/secrets/metrics_token
    static_configs:
      - targets: ["writer_service:8000"]

  - job_name: reader_service
    metrics_path: /metrics
    bearer_token_file: /run/secrets/metrics_token
    static_configs:
      - targets: ["reader_service:8000"]

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres_exporter:9187"]
