events {}

http {
  log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$request_id"';
  access_log /var/log/nginx/access.log main;
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream writer { server writer_service:8000; }
  upstream reader { server reader_service:8000; }

  server {
    listen 80;
    return 308 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 32k;
    limit_req zone=api burst=50 nodelay;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    location /write/ {
      proxy_pass http://writer/;
    }

    location /read/ {
      proxy_pass http://reader/;
    }
  }
}
